name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Verify tag matches widget version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG="${TAG_NAME#v}"
          VER=$(node -p "require('./widget/info.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "tag $TAG_NAME does not match widget/info.json version $VER"
            exit 1
          fi
      - name: Test
        run: npm test
      - name: Package
        run: npm run package
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" dist/*.tgz --generate-notes --title "$TAG_NAME"
